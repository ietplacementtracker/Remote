# local.properties
#
# This file is automatically generated by Android Studio and should NOT be
# committed to version control (.gitignore should exclude this file).
#
# It points to your local Android SDK installation.
# Android Studio will regenerate this file automatically on first open.
#
# Example (update this path to match your machine):
# sdk.dir=/Users/YourName/Library/Android/sdk          # macOS
# sdk.dir=C\:\\Users\\YourName\\AppData\\Local\\Android\\Sdk  # Windows
# sdk.dir=/home/yourusername/Android/Sdk               # Linux

## IMPORTANT: Replace the path below with your actual Android SDK location.
## Android Studio usually sets this automatically when you open the project.
sdk.dir=YOUR_SDK_PATH_HERE
